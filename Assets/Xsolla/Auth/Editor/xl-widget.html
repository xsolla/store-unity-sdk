<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xsolla Login Widget</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #xl_auth { width: 100%; height: 100%; min-width: 400px; min-height: 550px; }
    </style>
    <script src="https://cdn.xsolla.net/xsolla-login-widget/sdk/2.2.6/xl.min.js"></script>
    <script type="text/javascript">
        // Get rid of the Facebook residue hash in the URI
        // Must be done in JS cuz hash only exists client-side
        // IE and Chrome version of the hack
        if (String(window.location.hash).substring(0, 1) == "#") {
            window.location.hash = "";
            window.location.href = window.location.href.slice(0, -1);
        }
        // Firefox version of the hack
        if (String(location.hash).substring(0, 1) == "#") {
            location.hash = "";
            location.href = location.href.substring(0, location.href.length - 3);
        }
    </script>
</head>
<body>
<div id="xl_auth"></div>
<script>
    const fullUrl = window.location.href;
    console.log("[Xsolla SDK] Url:" + fullUrl)

    const tokenMatch = fullUrl.match(/[?&]token=([^&]+)/);
    const token = tokenMatch ? decodeURIComponent(tokenMatch[1]) : null;
    const flowIdMatch = fullUrl.match(/[?&]sdk_flow_id=([^&]+)/);
    const flowId = flowIdMatch ? decodeURIComponent(flowIdMatch[1]) : null;

    function notifyParent(payload) {
        let delivered = false;

        // Primary transport: opener postMessage (existing behavior).
        try {
            if (window.opener && !window.opener.closed) {
                window.opener.postMessage(payload, '*');
                delivered = true;
            }
        } catch (error) {
            console.warn("[Xsolla SDK] opener postMessage failed:", error);
        }

        // Fallback transport: BroadcastChannel for opener-less popups.
        try {
            if (flowId && typeof BroadcastChannel !== "undefined") {
                const channel = new BroadcastChannel("xsolla-auth-" + flowId);
                channel.postMessage(payload);
                channel.close();
                delivered = true;
            }
        } catch (error) {
            console.warn("[Xsolla SDK] BroadcastChannel failed:", error);
        }

        // Fallback transport: localStorage event/polling channel.
        try {
            if (flowId) {
                localStorage.setItem("xsolla-auth-" + flowId, JSON.stringify(payload));
                delivered = true;
            }
        } catch (error) {
            console.warn("[Xsolla SDK] localStorage fallback failed:", error);
        }

        return delivered;
    }

    if (token) {
        const payload = { type: 'xsolla-widget-auth', data: token, flowId: flowId };
        if (notifyParent(payload)) {
            window.close();
        } else {
            document.body.innerText = "Unable to communicate with the parent window.";
        }
    } else {
        const projectIdMatch = fullUrl.match(/[?&]project_id=([^&]+)/);
        const projectId = projectIdMatch ? projectIdMatch[1] : null;

        const localeMatch = fullUrl.match(/[?&]locale=([^&]+)/);
        const locale = localeMatch ? localeMatch[1] : null;

        console.log("[Xsolla SDK] Launching widget with projectId:", projectId, "locale:", locale);

        if (!projectId) {
            console.error("[Xsolla SDK] Missing project_id in URL.");
            document.body.innerText = "Missing project id in URL.";
        } else {
            var callbackUrl = window.location.origin + window.location.pathname;
            if (flowId) {
                callbackUrl += "?sdk_flow_id=" + encodeURIComponent(flowId);
            }

            var initOptions = {
                projectId: projectId,
                callbackUrl: callbackUrl
            };
            if (locale) {
                initOptions.locale = locale;
            }
            XL.init(initOptions);
            // Use block mode instead of XL.show() fullscreen mode.
            // Fullscreen mode closes on click-outside (causing blank widget);
            // block mode keeps the widget visible when clicking the background.
            XL.AuthWidget('xl_auth', {
                width: 600,
                height: 650
            });
        }
    }
</script>
</body>
</html>
